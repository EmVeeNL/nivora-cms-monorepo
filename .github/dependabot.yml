version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    ignore:
      # TanStack uses `latest` tags — pin manually when upgrading
      - dependency-name: "@tanstack/*"
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    groups:
      github-actions:
        patterns:
          - "*"
